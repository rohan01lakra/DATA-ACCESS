sources:
  juniper_syslog:
    type: syslog
    address: 0.0.0.0:5140
    mode: udp

  goflow_tcp_json:
    type: socket
    address: 0.0.0.0:4740
    mode: tcp # Using TCP eliminates packet loss between the local containers

transforms:
  parse_goflow:
    type: remap
    inputs: ["goflow_tcp_json"]
    source: |
      . = parse_json!(.message)

sinks:
  openobserve_syslog:
    type: http
    inputs: ["juniper_syslog"]
    uri: http://openobserve:5080/api/default/syslog/_json
    auth:
      strategy: basic
      user: admin@example.com
      password: Rahul@7503642684#
    encoding:
      codec: json

  openobserve_netflow:
    type: http
    inputs: ["parse_goflow"]
    uri: http://openobserve:5080/api/default/netflow/_json
    auth:
      strategy: basic
      user: admin@example.com
      password: Rahul@7503642684#
    encoding:
      codec: json
