services:
  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:latest
    restart: always
    environment:
      # Initial administrator credentials
      - ZO_ROOT_USER_EMAIL=admin@example.com
      - ZO_ROOT_USER_PASSWORD=ComplexPassword123
    ports:
      - "5080:5080"      # Web UI and API
      - "514:5514/udp"   # Syslog UDP
      - "514:5514/tcp"   # Syslog TCP
    volumes:
      - ./data:/data     # Persistent storage for logs, metrics, and traces
