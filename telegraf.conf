[agent]
  interval = "60s"
  flush_interval = "60s"

[[inputs.snmp]]
  agents = [
    "udp://10.250.250.150:161",
    "udp://10.250.250.151:161"
  ]

  version = 3

  sec_name = "RailTel"
  sec_level = "authPriv"

  auth_protocol = "SHA256"
  auth_password = "RailTel123"

  priv_protocol = "AES"
  priv_password = "RailTel123"

  name = "srx_interfaces"

  [[inputs.snmp.field]]
    oid = ".1.3.6.1.2.1.1.5.0"
    name = "sysName"
    is_tag = true

  [[inputs.snmp.table]]
    name = "interfaces"

    [[inputs.snmp.table.field]]
      oid = ".1.3.6.1.2.1.2.2.1.1"
      name = "ifIndex"
      is_tag = true

    [[inputs.snmp.table.field]]
      oid = ".1.3.6.1.2.1.2.2.1.2"
      name = "ifDescr"
      is_tag = true

    [[inputs.snmp.table.field]]
      oid = ".1.3.6.1.2.1.31.1.1.1.18"
      name = "ifAlias"
      is_tag = true

    [[inputs.snmp.table.field]]
      oid = ".1.3.6.1.2.1.31.1.1.1.6"
      name = "ifHCInOctets"

    [[inputs.snmp.table.field]]
      oid = ".1.3.6.1.2.1.31.1.1.1.10"
      name = "ifHCOutOctets"

[[outputs.http]]
  url = "http://openobserve:5080/api/default/snmp/_json"

  method = "POST"

  username = "admin@example.com"
  password = "Rahul@7503642684#"

  data_format = "json"

  timeout = "30s"

  [outputs.http.headers]
    Content-Type = "application/json"
